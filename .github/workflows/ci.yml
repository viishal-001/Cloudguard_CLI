name: CloudGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff
      - name: Lint check
        run: ruff check cloudguard/ tests/
      - name: Format check
        run: ruff format --check cloudguard/ tests/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit safety
      - name: Bandit security scan
        run: bandit -r cloudguard/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Bandit report
        if: always()
        run: bandit -r cloudguard/ -ll
      - name: Safety dependency check
        run: safety check --output json || true
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA\|aws_secret_access_key\s*=\s*['\"]" cloudguard/ --include="*.py" | grep -v "test" | grep -v "#" | grep -v "environ"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=cloudguard --cov-report=term-missing --cov-fail-under=60
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Type check
        run: mypy cloudguard/ --ignore-missing-imports || true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cloudguard:ci .
      - name: Verify CLI in container
        run: docker run --rm cloudguard:ci --version
      - name: Run checks in container
        run: docker run --rm cloudguard:ci checks
