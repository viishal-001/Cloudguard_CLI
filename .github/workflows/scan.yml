name: CloudGuard Scan (OIDC)

# Per prompt spec §G: CI/OIDC scan workflow example
# Uses GitHub Actions OIDC for keyless authentication
# See infra/oidc-trust-policy-template.json for trust setup

on:
  schedule:
    # Weekly scan — adjust as needed
    # ⚠️ Safety note: Scheduled scans should use --force to skip interactive prompts
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to scan (comma-separated, or ALL)'
        default: 'ALL'

permissions:
  id-token: write  # Required for OIDC
  contents: read
  security-events: write  # For uploading SARIF

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CloudGuard
        run: pip install -e .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::TARGET_ACCOUNT_ID:role/CloudGuardOIDC
          aws-region: us-east-1
          # role-session-name is automatically set to the GitHub run ID

      - name: Run CloudGuard scan
        run: |
          cloudguard scan \
            ${{ github.event.inputs.services == 'ALL' && '--all' || format('--services {0}', github.event.inputs.services) }} \
            --force \
            --output sarif > cloudguard-results.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: cloudguard-results.sarif
          category: cloudguard

      - name: Generate JSON report
        if: always()
        run: |
          cloudguard scan --all --force --output json > cloudguard-report.json

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cloudguard-scan-results
          path: |
            cloudguard-results.sarif
            cloudguard-report.json
