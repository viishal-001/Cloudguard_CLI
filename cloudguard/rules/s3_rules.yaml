# S3 Security Rules
# Per MVP §6: S3 is service #2 of 20 scanned services
# Per PRD §2: Public S3 buckets are a leading cause of data breaches

rules:
  - id: s3-public-access
    description: "S3 bucket allows public access"
    severity: CRITICAL
    cvss_vector: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N"
    cis_mapping: "CIS 2.1.1"
    mitigation: |
      Enable S3 Block Public Access:
      1. AWS CLI: aws s3api put-public-access-block --bucket <bucket> --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
      2. CloudFormation: Set PublicAccessBlockConfiguration on AWS::S3::Bucket

  - id: s3-no-encryption
    description: "S3 bucket does not have default encryption enabled"
    severity: HIGH
    cvss_vector: "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N"
    cis_mapping: "CIS 2.1.2"
    mitigation: |
      Enable default encryption:
      1. AWS CLI: aws s3api put-bucket-encryption --bucket <bucket> --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"aws:kms"}}]}'
      2. Use KMS keys for sensitive data

  - id: s3-no-versioning
    description: "S3 bucket does not have versioning enabled"
    severity: MEDIUM
    cvss_vector: "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:L"
    cis_mapping: "CIS 2.1.3"
    mitigation: |
      Enable bucket versioning:
      aws s3api put-bucket-versioning --bucket <bucket> --versioning-configuration Status=Enabled

  - id: s3-no-logging
    description: "S3 bucket does not have access logging enabled"
    severity: MEDIUM
    cvss_vector: "CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:N/I:L/A:N"
    cis_mapping: "CIS 2.1.4"
    mitigation: |
      Enable server access logging:
      aws s3api put-bucket-logging --bucket <bucket> --bucket-logging-status '{"LoggingEnabled":{"TargetBucket":"<log-bucket>","TargetPrefix":"<prefix>/"}}'

  - id: s3-no-ssl-enforcement
    description: "S3 bucket policy does not enforce SSL/TLS"
    severity: HIGH
    cvss_vector: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N"
    cis_mapping: "CIS 2.1.5"
    mitigation: |
      Add bucket policy requiring SSL:
      aws s3api put-bucket-policy --bucket <bucket> --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Deny","Principal":"*","Action":"s3:*","Resource":"arn:aws:s3:::<bucket>/*","Condition":{"Bool":{"aws:SecureTransport":"false"}}}]}'
