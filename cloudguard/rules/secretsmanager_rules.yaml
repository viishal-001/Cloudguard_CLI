# Secrets Manager Security Rules
rules:
  - id: secretsmanager-no-rotation
    description: "Secret does not have automatic rotation configured"
    severity: MEDIUM
    cvss_vector: "CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:N/A:N"
    cis_mapping: ""
    mitigation: |
      Enable automatic rotation with a Lambda function:
      aws secretsmanager rotate-secret --secret-id <arn> --rotation-lambda-arn <lambda-arn> --rotation-rules AutomaticallyAfterDays=30

  - id: secretsmanager-not-used-recently
    description: "Secret has not been accessed in over 90 days"
    severity: LOW
    cvss_vector: "CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:L/I:N/A:N"
    cis_mapping: ""
    mitigation: |
      Review unused secrets. Remove or disable secrets no longer needed.
