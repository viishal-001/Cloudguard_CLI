version: "3.8"

services:
  cloudguard:
    build:
      context: .
      target: runtime
    environment:
      - AWS_DEFAULT_REGION=us-east-1
    command: ["--help"]

  test:
    build:
      context: .
      target: builder
    command: ["sh", "-c", "pip install -e '.[dev]' && pytest tests/ -v --tb=short"]
    environment:
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - .:/build
